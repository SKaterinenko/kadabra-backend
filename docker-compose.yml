version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: miners_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: miners
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d miners"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: